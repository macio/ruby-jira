[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}**breaking** {% endif %}{{ commit.message | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/macio/ruby-jira/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
{% for release in releases %}\
    {% if release.version %}\
        {% if release.previous.version %}\
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/macio/ruby-jira/compare/{{ release.previous.version }}...{{ release.version }}
        {% endif %}\
    {% else %}\
[Unreleased]: https://github.com/macio/ruby-jira/compare/{{ releases | filter(attribute="version") | first | get(key="version") }}...HEAD
    {% endif %}\
{% endfor %}
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
]
filter_commits = true
tag_pattern = "v[0-9]*"
ignore_tags = "alpha|beta|rc"
topo_order = false
sort_commits = "newest"
